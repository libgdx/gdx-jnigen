name: Build and publish

on:
  push:
    branches: [ master ]
  release:
    types: [ published ]

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux, Windows and Android natives, test on Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Install cross-compilation toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf libc6-dev-armhf-cross \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu libc6-dev-riscv64-cross \
            mingw-w64 lib32z1

      - name: Download Android NDK
        run: |
          mkdir -p $HOME/android-ndk
          cd $HOME/android-ndk
          wget https://dl.google.com/android/repository/android-ndk-r27d-linux.zip -O android-ndk.zip
          echo "601246087a682d1944e1e16dd85bc6e49560fe8b6d61255be2829178c8ed15d9  android-ndk.zip" | sha256sum --check
          unzip -q android-ndk.zip
          echo "NDK_HOME=$HOME/android-ndk/android-ndk-r27d" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build libffi
        run: |
          ./gradlew build_linux
          ./gradlew build_windows
          ./gradlew build_android

      - name: Initialize jnigen
        run: ./gradlew jnigen

      - name: Build natives
        run: ./gradlew jnigenBuildAllLinux jnigenBuildAllWindows jnigenBuildAllAndroid

      - name: Run tests
        run: ./gradlew test

      - name: Pack artifacts
        run: |
          find . -name "*.a" -o -name "*.dll" -o -name "*.dylib" -o -name "*.so" | grep "libs" > native-files-list
          zip natives-linux -@ < native-files-list

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: natives-linux.zip
          path: natives-linux.zip

  build-mac:
    name: Build macOS and iOS natives, test on macOS
    runs-on: macos-14
    steps:
      - name: Setup Xcode SDK
        run: |
          # See https://github.com/actions/virtual-environments/issues/2557
          sudo mv /Library/Developer/CommandLineTools/SDKs/* /tmp
          sudo mv /Applications/Xcode.app /Applications/Xcode.app.bak
          sudo mv /Applications/Xcode_15.4.0.app /Applications/Xcode.app
          sudo xcode-select -switch /Applications/Xcode.app
          /usr/bin/xcodebuild -version

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build libffi
        run: |
          ./gradlew build_macos
          ./gradlew build_ios

      - name: Initialize jnigen
        run: ./gradlew jnigen

      - name: Build natives
        run: ./gradlew jnigenBuildAllMacOsX jnigenBuildAllIOS

      - name: Run tests
        run: ./gradlew test

      - name: Pack artifacts
        run: |
          find . -name "*.a" -o -name "*.dll" -o -name "*.dylib" -o -name "*.so" -o -name "*.xcframework" | grep "libs" > native-files-list
          zip -r natives-mac -@ < native-files-list

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: natives-mac.zip
          path: natives-mac.zip

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download Artifacts from linux
        uses: actions/download-artifact@v4
        with:
          name: natives-linux.zip

      - name: Unzip artifacts
        run: tar -xf natives-linux.zip

      # SKIP_NATIVE_BUILD skips the host native build; the tests run against the cross-built natives from build-linux
      - name: Run tests
        run: ./gradlew test -PSKIP_NATIVE_BUILD

  package:
    runs-on: ubuntu-22.04
    needs: [build-linux, build-mac, test-windows]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download Artifacts from linux
        uses: actions/download-artifact@v4
        with:
          name: natives-linux.zip

      - name: Download Artifacts from mac
        uses: actions/download-artifact@v4
        with:
          name: natives-mac.zip

      - name: Unzip artifacts
        run: |
          unzip -o natives-linux.zip
          unzip -o natives-mac.zip

      - name: Package All
        run: ./gradlew jnigenPackageAll

      - name: Snapshot build deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository_owner == 'libgdx'
        run: ./gradlew build publish -x test
        env:
          ORG_GRADLE_PROJECT_NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Import GPG key
        if: github.event_name == 'release' && github.repository_owner == 'libgdx'
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@1c6a9e9d3594f2d743f1b1dd7669ab0dfdffa922
        with:
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Release build deploy
        if: github.event_name == 'release' && github.repository_owner == 'libgdx'
        run: ./gradlew build publish -x test -PRELEASE -Psigning.gnupg.keyId=${{ secrets.GPG_KEYID }} -Psigning.gnupg.passphrase=${{ secrets.GPG_PASSPHRASE }} -Psigning.gnupg.keyName=${{ secrets.GPG_KEYID }}
        env:
          ORG_GRADLE_PROJECT_NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Trigger manual upload to Central Repository
        if: github.event_name == 'release' && github.repository_owner == 'libgdx'
        run: |
          curl -X POST \
            -H "Authorization: Bearer $(echo -n '${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }}' | base64)" \
            -H "Content-Type: application/json" \
            https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/com.badlogicgames
